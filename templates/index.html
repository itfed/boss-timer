<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Таймеры боссов</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="hero-copy">
                <h1>
                    <span class="brand-logo" aria-hidden="true">
                        <img src="/static/cookie-rider-logo-crop.jpg" alt="Печенька на печеньке-льве">
                    </span>
                    Boss Timer
                </h1>
            </div>
            <nav class="top-nav" aria-label="Основное меню">
                <a class="nav-link" href="/">Главная</a>
                <a class="nav-link active" href="/boss-timer">BossTimer</a>
            </nav>
        </header>
        
        <!-- Компактные таймеры Море и Глубина -->
        <div class="compact-timers">
            <div class="compact-timer">
                <span class="timer-label">Море:</span>
                <span class="timer-value" id="sea-timer">02:00:00</span>
                <button class="play-btn" onclick="toggleSeaTimer()">▶</button>
            </div>
            
            <div class="compact-timer">
                <span class="timer-label">Глубина:</span>
                <span class="timer-value" id="depth-timer">02:00:00</span>
                <button class="play-btn" onclick="toggleDepthTimer()">▶</button>
            </div>
        </div>
        
        <!-- Поле поиска боссов -->
        <div class="toolbar-row">
            <div class="boss-search-container">
                <input type="text" id="boss-search-input" placeholder="🔍 Поиск босса..." class="boss-search-input">
                <button class="search-clear-btn" id="search-clear-btn" style="display: none;">×</button>
            </div>
            <div class="server-time toolbar-time">
                Текущее время: <span id="server-time">--:--:--</span>
            </div>
        </div>
        
        <main>
            <div class="bosses-grid" id="bosses-container">
                <div class="loading">
                    <i class="fas fa-spinner fa-spin"></i> Загрузка боссов...
                </div>
            </div>

            <div class="history">
                <div class="history-header" onclick="toggleGlobalHistory()">
                    <h3><i class="fas fa-history"></i> Последние убийства:</h3>
                    <span class="toggle-icon" id="global-history-toggle">▼</span>
                </div>
                <div class="history-list" id="kill-history" style="display: none;">
                </div>
            </div>
            
            <!-- Скрытые кнопки администратора -->
            <div class="admin-controls">
                <button class="clear-history-btn" onclick="clearHistory()">
                    <i class="fas fa-history"></i> Очистить историю
                </button>
                <button class="reset-btn" onclick="resetAllTimers()">
                    <i class="fas fa-trash-alt"></i> Сбросить все
                </button>
            </div>
        </main>
    </div>

    <script src="/static/script.js?v=5"></script>
</body>
</html>
